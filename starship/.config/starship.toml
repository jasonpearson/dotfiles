[username]
show_always = true
style_user = "fg:#394260 bg:#94e2d5"
format = '[ $user ]($style)'

[directory]
style = "fg:#94e2d5 bg:#394260"
format = "[ $path ]($style)"
truncation_length = 12
truncation_symbol = "ÔÇª/"
truncate_to_repo = false

[git_branch]
symbol = "´Éÿ"
style = "fg:#1d2230 bg:#8c97c0"
