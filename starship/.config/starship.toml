[hostname]
disabled = true

[custom.hostname]
command = 'echo "${HOSTNAME:-$(hostname)}" | sed "s/^jason-pearson-//"'
when = 'test -n "$SSH_CLIENT" || test -n "$SSH_TTY"'
format = '[$output](bold fg:#fab387) '

[os]
disabled = false
style = "fg:#394260 bg:#94e2d5"

